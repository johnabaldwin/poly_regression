# Verible SystemVerilog Style Configuration
# https://github.com/chipsalliance/verible

# Line length rules
line_length: 120

# Indentation
indent_width: 2

# Rules configuration
rules:
  # Naming conventions - relaxed for development
  - rule: "module-filename"
    enabled: true  # Don't allow module name to differ from filename
  
  - rule: "parameter-name-style"
    enabled: true
    configuration:
      style: "ALL_CAPS"  # Parameters should be UPPER_CASE
  
  - rule: "localparam-name-style"
    enabled: true
    configuration:
      style: "ALL_CAPS"
  
  # Port declarations
  - rule: "explicit-parameter-storage-type"
    enabled: true  # Require explicit types for parameters
  
  - rule: "port-name-suffix"
    enabled: false  # Don't enforce _i, _o suffixes
  
  # General style
  - rule: "line-length"
    enabled: true
    configuration:
      length: 120
  
  - rule: "no-trailing-spaces"
    enabled: true
  
  - rule: "forbid-consecutive-null-statements"
    enabled: true  # No ;; or empty statements
  
  - rule: "posix-eof"
    enabled: true  # Files should end with newline
  
  # Code structure
  - rule: "always-comb"
    enabled: true  # Prefer always_comb over always @*
  
  - rule: "always-ff"
    enabled: true  # Prefer always_ff over always @(posedge clk)
  
  # Disable overly strict rules during development
  - rule: "interface-name-style"
    enabled: false
  
  - rule: "signal-name-style"
    enabled: false  # Allow flexibility in signal naming
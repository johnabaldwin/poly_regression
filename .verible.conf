# Verible lint rules configuration
# Format: rule-name (enabled), -rule-name (disabled), rule-name=key:value (configured)
# Generate default list with: verible-verilog-lint --print_rules_file

# Naming conventions
module-filename
parameter-name-style=parameter_style:ALL_CAPS;localparam_style:ALL_CAPS
explicit-parameter-storage-type=exempt_type:

# Line length
line-length=length:120

# Whitespace
no-trailing-spaces
posix-eof

# Code structure
always-comb
always-ff-non-blocking=catch_modifying_assignments:false;waive_for_locals:false
forbid-consecutive-null-statements

# Disable rules that are overly strict for this project
-port-name-suffix
-interface-name-style
-signal-name-style
-dff-name-style
-explicit-begin
